---
# Scale CCRS services on k3s for load testing.
#
# Usage:
#   # Scale up hot-path services for high-VU tests:
#   ansible-playbook -i ansible/inventory.ini ansible/playbook-k8s-scale.yml -l k8s -e profile=heavy
#
#   # Reset to single replicas:
#   ansible-playbook -i ansible/inventory.ini ansible/playbook-k8s-scale.yml -l k8s -e profile=baseline
#
- name: Scale CCRS services for load testing
  hosts: k8s
  become: true
  vars:
    profile: baseline
    profiles:
      baseline:
        pgr-services: 1
        egov-user: 1
        egov-workflow-v2: 1
        egov-persister: 1
        egov-enc-service: 1
        egov-indexer: 1
        gateway: 1
        mdms-v2: 1
      moderate:
        pgr-services: 2
        egov-user: 2
        egov-workflow-v2: 2
        egov-persister: 2
        egov-enc-service: 1
        egov-indexer: 1
        gateway: 1
        mdms-v2: 1
      heavy:
        pgr-services: 3
        egov-user: 3
        egov-workflow-v2: 2
        egov-persister: 2
        egov-enc-service: 2
        egov-indexer: 2
        gateway: 1
        mdms-v2: 1

  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  tasks:
    - name: Validate profile
      fail:
        msg: "Unknown profile '{{ profile }}'. Use: baseline, moderate, or heavy"
      when: profile not in profiles

    - name: Scale deployments to {{ profile }} profile
      command: "kubectl scale deploy {{ item.key }} -n egov --replicas={{ item.value }}"
      loop: "{{ profiles[profile] | dict2items }}"
      loop_control:
        label: "{{ item.key }}={{ item.value }}"

    - name: Wait for rollout
      command: "kubectl rollout status deploy/{{ item.key }} -n egov --timeout=120s"
      loop: "{{ profiles[profile] | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Show cluster state
      shell: |
        echo "=== Node Resources ==="
        kubectl top node
        echo ""
        echo "=== Running Pods ==="
        kubectl get pods -n egov --no-headers | grep Running | wc -l
      register: state
      changed_when: false

    - name: Print state
      debug:
        msg: "{{ state.stdout_lines }}"
