---
# Setup CCRS on a single-node k3s cluster with Helm charts, then prepare for load testing.
#
# Usage:
#   ansible-playbook -i ansible/inventory.ini ansible/playbook-k8s-setup.yml -l k8s
#
# Prerequisites:
#   - Ubuntu 24.04 target with >= 16 cores, 30 GB RAM, 200 GB disk
#   - SSH access as root (or user with sudo)
#
# What this does:
#   1. Installs k3s (single-node Kubernetes)
#   2. Installs Helm, Helmfile, k6
#   3. Clones CCRS repo and patches configs for single-node
#   4. Deploys backbone services (PostgreSQL, Kafka, Elasticsearch, Redis, MinIO, etc.)
#   5. Deploys CCRS application services via Helmfile
#   6. Waits for data bootstrap (MDMS schemas, localizations, users)
#   7. Creates a load-test user and pre-creates citizen users
#   8. Configures nginx reverse proxy for k6 access
#   9. Runs a smoke test to validate the deployment
#
- name: Setup CCRS on k3s for load testing
  hosts: k8s
  become: true
  vars:
    ccrs_repo: https://github.com/egovernments/Citizen-Complaint-Resolution-System.git
    ccrs_branch: develop
    ccrs_dir: /root/Citizen-Complaint-Resolution-System
    charts_dir: "{{ ccrs_dir }}/devops/deploy-as-code/charts"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    tenant_id: pg
    city_tenant: pg.citya
    admin_password: "eGov@123"
    db_password: pgrdemo123
    loadtest_username: LOADTEST
    loadtest_phone: "9888888888"
    citizen_count: 100

  environment:
    KUBECONFIG: "{{ kubeconfig }}"

  tasks:
    # ── Phase 1: Install k3s ──────────────────────────────────────────
    - name: Install k3s
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik --write-kubeconfig-mode 644" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      command: kubectl get nodes
      register: nodes
      retries: 30
      delay: 5
      until: "'Ready' in nodes.stdout"
      changed_when: false

    - name: Export KUBECONFIG in bashrc
      lineinfile:
        path: /root/.bashrc
        line: "export KUBECONFIG={{ kubeconfig }}"
        create: yes

    # ── Phase 2: Install tools ────────────────────────────────────────
    - name: Install Helm
      shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install Helmfile
      shell: |
        curl -Lo /tmp/helmfile.tar.gz https://github.com/helmfile/helmfile/releases/download/v0.169.2/helmfile_0.169.2_linux_amd64.tar.gz
        tar -xzf /tmp/helmfile.tar.gz -C /tmp/
        mv /tmp/helmfile /usr/local/bin/helmfile
        chmod +x /usr/local/bin/helmfile
      args:
        creates: /usr/local/bin/helmfile

    - name: Install helm-diff plugin
      shell: helm plugin install https://github.com/databus23/helm-diff
      args:
        creates: /root/.local/share/helm/plugins/helm-diff
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Install k6
      shell: |
        curl -sL https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz | tar xz -C /tmp
        mv /tmp/k6-v0.54.0-linux-amd64/k6 /usr/local/bin/k6
      args:
        creates: /usr/local/bin/k6

    - name: Install nginx
      apt:
        name: nginx
        state: present

    # ── Phase 3: Clone and patch CCRS ─────────────────────────────────
    - name: Clone CCRS repository
      git:
        repo: "{{ ccrs_repo }}"
        dest: "{{ ccrs_dir }}"
        version: "{{ ccrs_branch }}"
        force: yes

    - name: Create namespaces
      command: "kubectl create namespace {{ item }}"
      loop: [egov, backbone]
      register: ns_result
      failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr
      changed_when: ns_result.rc == 0

    # ── Patch env.yaml for single-node k8s ────────────────────────────
    - name: Get server IP
      shell: hostname -I | awk '{print $1}'
      register: server_ip
      changed_when: false

    - name: Patch env.yaml — domain and DB config
      replace:
        path: "{{ charts_dir }}/environments/env.yaml"
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: '<domain_name>', replace: '{{ server_ip.stdout }}.nip.io' }
        - { regexp: 'https://<domain_name>/', replace: 'http://{{ server_ip.stdout }}.nip.io/' }
        - { regexp: '<db_host_name>/<db_name>', replace: 'postgresql.backbone:5432/egov_db' }
        - { regexp: '<db_host_name>', replace: 'postgresql.backbone' }
        - { regexp: '<db_name>', replace: 'egov_db' }
        - { regexp: '<tenant_id>', replace: '{{ tenant_id }}' }
        - { regexp: "cert-issuer: \"letsencrypt-prod\"", replace: 'cert-issuer: "letsencrypt-staging"' }
        - { regexp: '<filestore_s3_bucket> ## Update your bucket name', replace: 'egov-filestore' }
        - { regexp: "is-s3-enabled: \"true\"", replace: 'is-s3-enabled: "false"' }
        - { regexp: 'minio-enabled: false', replace: 'minio-enabled: true' }
        - { regexp: 'storageClassName: gp3', replace: 'storageClassName: local-path' }
        - { regexp: '<storage_class>', replace: 'local-path' }

    - name: Patch env.yaml — pgadmin DB URLs
      replace:
        path: "{{ charts_dir }}/environments/env.yaml"
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: 'pgr-demo-db.czvokiourya9.ap-south-1.rds.amazonaws.com', replace: 'postgresql.backbone' }
        - { regexp: 'maintenance-db-name: "pgr_demo_db"', replace: 'maintenance-db-name: "egov_db"' }
        - { regexp: 'db-admin-username: "pgrdemo"', replace: 'db-admin-username: "postgres"' }
        - { regexp: 'db-read-username: "pgrdemo"', replace: 'db-read-username: "postgres"' }

    - name: Patch env-secrets.yaml — DB username
      replace:
        path: "{{ charts_dir }}/environments/env-secrets.yaml"
        regexp: '<db_username>'
        replace: 'postgres'

    # ── Patch backbone for single-node (1 replica, soft anti-affinity) ─
    - name: Patch Elasticsearch master — single replica, soft anti-affinity
      replace:
        path: "{{ charts_dir }}/backbone-services/elasticsearch/values.yaml"
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: '^replicas: 3', replace: 'replicas: 1' }
        - { regexp: 'minimumMasterNodes: 2', replace: 'minimumMasterNodes: 1' }
        - { regexp: 'antiAffinity: "hard"', replace: 'antiAffinity: "soft"' }

    - name: Patch Elasticsearch data — single replica, soft anti-affinity
      replace:
        path: "{{ charts_dir }}/backbone-services/elasticsearch-data/values.yaml"
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: '^replicas: 3', replace: 'replicas: 1' }
        - { regexp: 'minimumMasterNodes: 2', replace: 'minimumMasterNodes: 1' }
        - { regexp: 'antiAffinity: "hard"', replace: 'antiAffinity: "soft"' }

    - name: Patch Kafka KRaft — single broker with replication factor 1
      shell: |
        cd {{ charts_dir }}/backbone-services/kafka-kraft
        # Single controller replica
        sed -i 's/  replicaCount: 3/  replicaCount: 1/' values.yaml
        # Set controller.extraConfig for single-broker replication using python for safe multiline
        python3 -c "
        import re
        with open('values.yaml') as f: t = f.read()
        old = '  ## @param controller.extraConfig Additional configuration to be appended at the end of the generated Kafka controller-eligible nodes configuration file.\n  ##\n  extraConfig: \"\"'
        new = '  ## @param controller.extraConfig Additional configuration to be appended at the end of the generated Kafka controller-eligible nodes configuration file.\n  ##\n  extraConfig: |\n    offsets.topic.replication.factor=1\n    transaction.state.log.replication.factor=1\n    transaction.state.log.min.isr=1\n    default.replication.factor=1'
        t = t.replace(old, new, 1)
        with open('values.yaml', 'w') as f: f.write(t)
        "

    - name: Patch PostgreSQL — use available image tag
      replace:
        path: "{{ charts_dir }}/backbone-services/postgresql/values.yaml"
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: 'tag: 14.5.0-debian-11-r35', replace: 'tag: 14.13.0-debian-12-r14' }
        - { regexp: '  postgresPassword: ""', replace: '  postgresPassword: "{{ db_password }}"' }
        - { regexp: '  database: ""', replace: '  database: "egov_db"' }

    # ── Phase 4: Deploy backbone services ─────────────────────────────
    - name: Deploy backbone services via Helmfile (excluding PostgreSQL and MinIO)
      shell: helmfile -e env -f backbone-services/backboneservices-helmfile.yaml sync
      args:
        chdir: "{{ charts_dir }}"
      register: backbone_result
      # MinIO/Kibana may timeout on first run — that's ok
      failed_when: false

    - name: Deploy PostgreSQL manually (bitnami images unavailable on Docker Hub)
      shell: |
        cat <<'YAML' | kubectl apply -f -
        apiVersion: apps/v1
        kind: StatefulSet
        metadata:
          name: postgresql
          namespace: backbone
          labels: { app: postgresql }
        spec:
          serviceName: postgresql
          replicas: 1
          selector:
            matchLabels: { app: postgresql }
          template:
            metadata:
              labels: { app: postgresql }
            spec:
              containers:
                - name: postgresql
                  image: postgres:14
                  ports: [{ containerPort: 5432 }]
                  env:
                    - { name: POSTGRES_DB, value: egov_db }
                    - { name: POSTGRES_USER, value: postgres }
                    - { name: POSTGRES_PASSWORD, value: "{{ db_password }}" }
                    - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
                  volumeMounts:
                    - { name: data, mountPath: /var/lib/postgresql/data }
                  resources:
                    requests: { memory: 256Mi, cpu: 250m }
                    limits: { memory: 1Gi, cpu: 1000m }
                  readinessProbe:
                    exec: { command: [pg_isready, -U, postgres] }
                    initialDelaySeconds: 5
                    periodSeconds: 10
          volumeClaimTemplates:
            - metadata: { name: data }
              spec:
                accessModes: ["ReadWriteOnce"]
                storageClassName: local-path
                resources: { requests: { storage: 10Gi } }
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: postgresql
          namespace: backbone
          labels: { app: postgresql }
        spec:
          type: ClusterIP
          ports: [{ port: 5432, targetPort: 5432 }]
          selector: { app: postgresql }
        YAML

    - name: Deploy MinIO manually
      shell: |
        cat <<'YAML' | kubectl apply -f -
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: minio-data
          namespace: backbone
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: local-path
          resources: { requests: { storage: 20Gi } }
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: minio
          namespace: backbone
          labels: { app: minio }
        spec:
          replicas: 1
          selector:
            matchLabels: { app: minio }
          template:
            metadata:
              labels: { app: minio }
            spec:
              containers:
                - name: minio
                  image: quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
                  args: [server, /data, --console-address, ":9001"]
                  ports:
                    - { containerPort: 9000, name: api }
                    - { containerPort: 9001, name: console }
                  env:
                    - { name: MINIO_ROOT_USER, value: root }
                    - { name: MINIO_ROOT_PASSWORD, value: "minio@123" }
                  volumeMounts:
                    - { name: data, mountPath: /data }
                  resources:
                    requests: { memory: 256Mi, cpu: 250m }
                    limits: { memory: 512Mi, cpu: 500m }
              volumes:
                - name: data
                  persistentVolumeClaim: { claimName: minio-data }
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: minio-svc
          namespace: backbone
          labels: { app: minio }
        spec:
          type: ClusterIP
          ports:
            - { port: 9000, targetPort: 9000, name: api }
            - { port: 9001, targetPort: 9001, name: console }
          selector: { app: minio }
        YAML

    - name: Create MinIO secrets in both namespaces
      shell: |
        kubectl create secret generic minio \
          --from-literal=rootUser=root --from-literal=rootPassword='minio@123' \
          -n {{ item }} --dry-run=client -o yaml | kubectl apply -f -
      loop: [backbone, egov]

    - name: Create MinIO accesskey secret for egov namespace (filestore)
      shell: |
        kubectl create secret generic minio \
          --from-literal=accesskey=root --from-literal=secretkey='minio@123' \
          --from-literal=rootUser=root --from-literal=rootPassword='minio@123' \
          -n egov --dry-run=client -o yaml | kubectl apply -f -

    - name: Wait for PostgreSQL to be ready
      command: kubectl wait --for=condition=ready pod -l app=postgresql -n backbone --timeout=120s
      retries: 3
      delay: 10

    - name: Wait for Kafka to be ready
      command: kubectl wait --for=condition=ready pod -l app.kubernetes.io/instance=kafka-kraft -n backbone --timeout=180s
      retries: 3
      delay: 10

    # ── Phase 5: Deploy application services ──────────────────────────
    - name: Label MinIO secret for Helm adoption by configmaps chart
      shell: |
        kubectl label secret minio -n backbone app.kubernetes.io/managed-by=Helm --overwrite
        kubectl annotate secret minio -n backbone meta.helm.sh/release-name=configmaps meta.helm.sh/release-namespace=egov --overwrite
        kubectl label secret minio -n egov app.kubernetes.io/managed-by=Helm --overwrite
        kubectl annotate secret minio -n egov meta.helm.sh/release-name=configmaps meta.helm.sh/release-namespace=egov --overwrite

    - name: Deploy core services (first pass — configmaps may fail)
      shell: helmfile -e env -f core-services/coreservices-helmfile.yaml sync
      args:
        chdir: "{{ charts_dir }}"
      register: core_result
      failed_when: false

    - name: Retry core services (dependency ordering + configmaps)
      shell: helmfile -e env -f core-services/coreservices-helmfile.yaml sync
      args:
        chdir: "{{ charts_dir }}"
      register: core_retry
      failed_when: false

    - name: Deploy urban services
      shell: helmfile -e env -f urban/urban-helmfile.yaml sync
      args:
        chdir: "{{ charts_dir }}"
      failed_when: false

    - name: Deploy common services
      shell: helmfile -e env -f common-services/common-services-helmfile.yaml sync
      args:
        chdir: "{{ charts_dir }}"

    - name: Deploy analytics services
      shell: helmfile -e env -f analytics/analytics-helmfile.yaml sync
      args:
        chdir: "{{ charts_dir }}"

    # ── Phase 6: Wait for data bootstrap ──────────────────────────────
    - name: Wait for default-data-handler to load MDMS schemas (up to 5 min)
      shell: |
        kubectl exec -n backbone postgresql-0 -- \
          psql -U postgres -d egov_db -tAc "SELECT COUNT(*) FROM eg_mdms_schema_definition;"
      register: schema_count
      retries: 30
      delay: 10
      until: schema_count.stdout | int > 20
      changed_when: false

    - name: Wait for egov-user to be ready
      command: kubectl wait --for=condition=ready pod -l app=egov-user -n egov --timeout=300s
      retries: 3
      delay: 10

    - name: Restart default-data-handler to load users and workflow config
      command: kubectl rollout restart deployment default-data-handler -n egov

    - name: Wait for PGR workflow business service to be loaded (up to 3 min)
      shell: |
        kubectl exec -n backbone postgresql-0 -- \
          psql -U postgres -d egov_db -tAc "SELECT COUNT(*) FROM eg_wf_businessservice_v2;"
      register: wf_count
      retries: 18
      delay: 10
      until: wf_count.stdout | trim | int > 0
      changed_when: false

    # ── Phase 7: Create load test user ────────────────────────────────
    - name: Get egov-user ClusterIP
      command: kubectl get svc egov-user -n egov -o jsonpath='{.spec.clusterIP}'
      register: user_svc_ip
      changed_when: false

    - name: Create load test employee user
      uri:
        url: "http://{{ user_svc_ip.stdout }}:8080/user/users/_createnovalidate"
        method: POST
        body_format: json
        body:
          RequestInfo:
            apiId: Rainmaker
          user:
            userName: "{{ loadtest_username }}"
            name: Load Test Admin
            gender: MALE
            mobileNumber: "{{ loadtest_phone }}"
            active: true
            type: EMPLOYEE
            password: "{{ admin_password }}"
            tenantId: "{{ city_tenant }}"
            roles:
              - { name: PGR Last Mile Employee, code: PGR_LME, tenantId: "{{ city_tenant }}" }
              - { name: Customer Support Representative, code: CSR, tenantId: "{{ city_tenant }}" }
              - { name: Grievance Routing Officer, code: GRO, tenantId: "{{ city_tenant }}" }
              - { name: Super User, code: SUPERUSER, tenantId: "{{ city_tenant }}" }
              - { name: PGR VIEWER, code: PGR_VIEWER, tenantId: "{{ city_tenant }}" }
            otpReference: "12345"
        status_code: [200, 400]
      register: loadtest_user

    - name: Get auth token for citizen creation
      uri:
        url: "http://{{ user_svc_ip.stdout }}:8080/user/oauth/token"
        method: POST
        body_format: form-urlencoded
        body:
          username: "{{ loadtest_username }}"
          password: "{{ admin_password }}"
          grant_type: password
          scope: read
          tenantId: "{{ city_tenant }}"
          userType: EMPLOYEE
        headers:
          Authorization: "Basic ZWdvdi11c2VyLWNsaWVudDo="
        status_code: 200
      register: admin_auth
      retries: 5
      delay: 10

    - name: Pre-create {{ citizen_count }} citizen users for load testing
      uri:
        url: "http://{{ user_svc_ip.stdout }}:8080/user/users/_createnovalidate"
        method: POST
        body_format: json
        body:
          RequestInfo:
            apiId: Rainmaker
            authToken: "{{ admin_auth.json.access_token }}"
            userInfo: "{{ admin_auth.json.UserRequest }}"
          user:
            name: "LoadTestCitizen_{{ item }}"
            mobileNumber: "9900000{{ '%03d' | format(item) }}"
            password: "{{ admin_password }}"
            tenantId: "{{ city_tenant }}"
            type: CITIZEN
            roles:
              - { code: CITIZEN, name: Citizen, tenantId: "{{ city_tenant }}" }
        status_code: [200, 400]
      loop: "{{ range(1, citizen_count + 1) | list }}"
      loop_control:
        label: "citizen {{ item }}"
      ignore_errors: true

    # ── Phase 8: Configure nginx reverse proxy ────────────────────────
    - name: Get service ClusterIPs
      command: "kubectl get svc {{ item }} -n egov -o jsonpath='{.spec.clusterIP}'"
      loop: [egov-user, pgr-services, egov-workflow-v2, mdms-v2]
      register: svc_ips
      changed_when: false

    - name: Write nginx proxy config
      copy:
        dest: /etc/nginx/sites-available/k8s-proxy
        content: |
          upstream egov_user {
              server {{ svc_ips.results[0].stdout }}:8080;
              keepalive 64;
          }
          upstream pgr_services {
              server {{ svc_ips.results[1].stdout }}:8080;
              keepalive 64;
          }
          upstream egov_workflow {
              server {{ svc_ips.results[2].stdout }}:8080;
              keepalive 64;
          }
          upstream mdms_v2 {
              server {{ svc_ips.results[3].stdout }}:8080;
              keepalive 64;
          }
          server {
              listen 18000;
              proxy_http_version 1.1;
              proxy_set_header Connection "";
              proxy_set_header Host $host;
              proxy_connect_timeout 10s;
              proxy_read_timeout 120s;
              proxy_send_timeout 120s;

              location /user/    { proxy_pass http://egov_user/user/; }
              location /pgr-services/ { proxy_pass http://pgr_services/pgr-services/; }
              location /egov-workflow-v2/ { proxy_pass http://egov_workflow/egov-workflow-v2/; }
              location /mdms-v2/ { proxy_pass http://mdms_v2/mdms-v2/; }
              location / { return 404 '{"error":"route not configured"}'; }
          }

    - name: Enable nginx proxy site
      file:
        src: /etc/nginx/sites-available/k8s-proxy
        dest: /etc/nginx/sites-enabled/k8s-proxy
        state: link

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart nginx
      service:
        name: nginx
        state: restarted

    # ── Phase 9: Smoke test ───────────────────────────────────────────
    - name: Verify login via nginx proxy
      uri:
        url: "http://127.0.0.1:18000/user/oauth/token"
        method: POST
        body_format: form-urlencoded
        body:
          username: "{{ loadtest_username }}"
          password: "{{ admin_password }}"
          grant_type: password
          scope: read
          tenantId: "{{ city_tenant }}"
          userType: EMPLOYEE
        headers:
          Authorization: "Basic ZWdvdi11c2VyLWNsaWVudDo="
        status_code: 200
      register: smoke_auth
      retries: 5
      delay: 10

    - name: Print deployment summary
      debug:
        msg: |
          ✅ CCRS deployed on k3s successfully!

          Node IP:        {{ server_ip.stdout }}
          Nginx proxy:    http://{{ server_ip.stdout }}:18000
          Login user:     {{ loadtest_username }} / {{ admin_password }}
          Tenant:         {{ city_tenant }}
          MDMS schemas:   {{ schema_count.stdout | trim }}
          Citizens:       {{ citizen_count }} pre-created

          To run load tests:
            cd /root/PGR-load-tests
            ./scripts/run-test.sh dev baseline smoke
            ./scripts/run-test.sh dev baseline ramp-2vu
            ./scripts/run-test.sh dev baseline ramp-300vu
